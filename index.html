<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mersal SMS Gateway</title>
    <style>
        body { background: #fdfdfd; font-family: 'Segoe UI', Tahoma; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 340px; text-align: center; border: 1px solid #eee; }
        h2 { color: #333; font-size: 20px; margin-bottom: 20px; }
        input, textarea { width: 100%; margin-bottom: 15px; padding: 14px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus { border-color: #007bff; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #0056b3; transform: translateY(-2px); }
        #status { margin-top: 20px; font-size: 13px; color: #777; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="box">
        <h2>بوابة مرسال الذكية</h2>
        <input type="text" id="phone" placeholder="رقم الهاتف (مثال: 96477xxxxxxx)">
        <textarea id="msg" rows="3" placeholder="اكتب نص الرسالة هنا..."></textarea>
        <button onclick="sendViaMersal()">إرسال الرسالة 🚀</button>
        <div id="status">جاهز للإرسال..</div>
    </div>

    <script>
        async function sendViaMersal() {
            const phone = document.getElementById('phone').value;
            const msg = document.getElementById('msg').value;
            const status = document.getElementById('status');

            if(!phone || !msg) return alert("يرجى ملء كافة الحقول");

            status.innerText = "⏳ جاري الإرسال عبر مرسال...";

            // البيانات المطلوبة لبوابة مرسال (حسب توثيقهم الرسمي)
            const payload = {
                "api_key": "ضغ_هنا_مفتاح_API_الخاص_بك",
                "sender": "اسم_المرسل",
                "number": phone,
                "message": msg
            };

            try {
                const response = await fetch('/mersal-api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                status.innerText = "النتيجة: " + (result.message || "تمت العملية");
            } catch (e) {
                status.innerText = "❌ حدث خطأ في الاتصال. تأكد من إعدادات البروكسي.";
            }
        }
    </script>
</body>
</html>
