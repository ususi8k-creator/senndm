<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Pro | Static Version</title>
    <style>
        :root {
            --bg: #050505;
            --card: #111111;
            --primary: #00f2fe;
            --secondary: #4facfe;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* تأثير خلفية متحركة */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            animation: move 20s linear infinite;
        }

        @keyframes move { from { transform: translateY(0); } to { transform: translateY(-50%); } }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
            width: 350px;
            text-align: center;
            position: relative;
        }

        .header-icon {
            font-size: 40px;
            background: linear-gradient(to bottom, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        h1 { font-size: 22px; margin: 10px 0; letter-spacing: 1px; }
        p { font-size: 12px; color: #888; margin-bottom: 25px; }

        .input-box {
            position: relative;
            margin-bottom: 20px;
            text-align: right;
        }

        label { font-size: 13px; color: var(--primary); display: block; margin-bottom: 5px; }

        input, textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4); }

        #log {
            margin-top: 15px;
            font-size: 11px;
            color: #555;
            height: 40px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header-icon">✦</div>
    <h1>SMS PRO</h1>
    <p>بوابة الإرسال الذكية - نسخة الويب</p>

    <div class="input-box">
        <label>رقم الهاتف (بدون مفتاح الدولة)</label>
        <input type="text" id="phone" placeholder="7xxxxxxxxx">
    </div>

    <div class="input-box">
        <label>محتوى الرسالة</label>
        <textarea id="msg" rows="2" placeholder="أدخل نص الرسالة..."></textarea>
    </div>

    <button id="sendBtn">إرسال الطلب الآن ⚡</button>

    <div id="log">انتظار الأوامر...</div>
</div>

<script>
    document.getElementById('sendBtn').addEventListener('click', async () => {
        const phone = document.getElementById('phone').value;
        const msg = document.getElementById('msg').value;
        const log = document.getElementById('log');

        if(!phone) { alert("يرجى إدخال الرقم"); return; }

        log.innerText = "جاري محاولة الإرسال...";

        // تجهيز البيانات بنفس تنسيق البايثون (URLSearchParams)
        const params = new URLSearchParams();
        params.append('action', 'send_pin_code');
        params.append('msisdn', phone);
        params.append('appId', '3');
        params.append('countryId', '2');
        params.append('currency', 'IQD');
        params.append('tax', '0');
        params.append('price', '1631');
        params.append('cPPPId', '268');
        params.append('packageName', msg);
        params.append('paymentMethodId', '3');

        try {
            const response = await fetch('https://pashacards.net/wp-admin/admin-ajax.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8'
                },
                body: params
            });

            const text = await response.text();
            log.innerText = "الاستجابة: " + text;
        } catch (error) {
            log.innerText = "فشل الطلب: قد يكون الموقع يحظر الإرسال المباشر من المتصفح (CORS).";
            console.error(error);
        }
    });
</script>

</body>
</html>
